<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Полный тренажёр — Русский язык Демо-2025</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; background: #f0f4f8; line-height: 1.5; }
        h1 { text-align: center; color: #2c3e50; }
        .question { background: white; padding: 25px; margin: 20px 0; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .options label { display: block; padding: 12px; margin: 10px 0; background: #f8f9fa; border-radius: 8px; cursor: pointer; }
        .options label:hover { background: #e3f2fd; }
        button { padding: 12px 28px; margin: 10px; font-size: 17px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-next { background: #3498db; color: white; }
        .btn-prev { background: #7f8c8d; color: white; }
        .btn-finish { background: #e74c3c; color: white; }
        .progress { text-align: center; font-size: 1.3em; font-weight: bold; margin-bottom: 15px; color: #2c3e50; }
        .result { text-align: center; font-size: 2.3em; margin: 40px 0; }
    </style>
</head>
<body>
    <h1>🎯 Полный тренажёр по русскому языку (Билет № демо-2025)</h1>
    <p style="text-align:center;">Все 17 вопросов полностью</p>

    <div id="quiz"></div>

    <div style="text-align:center; margin:30px 0;">
        <button class="btn-prev" onclick="prevQuestion()">← Назад</button>
        <button class="btn-next" onclick="nextQuestion()">Вперёд →</button>
        <button class="btn-finish" onclick="submitQuiz()">Завершить тест</button>
    </div>

    <div id="score" style="display:none;"></div>

    <script>
        const questions = [
            { q: "1. Выберите вариант ответа, в котором верно выделена буква, обозначающая ударный гласный звук. 1. углубИть 2. шарфЫ 3. цепОчка 4. нАчать 5. донИзу", options: ["А) 123", "Б) 25", "В) 13", "Г) 234"], correct: 1 },
            { q: "2. Подберите фразеологизм к его толкованию. У него семь пятниц на неделе.", options: ["А) О человеке, которого трудно заставить поверить чему-либо, убедить в чём-нибудь.", "Б) О том, кто часто меняет свои решения.", "В) О болтливом человеке.", "С) Об излишней вежливости."], correct: 1 },
            { q: "3. Выберите вариант ответа, в котором вместо слова ДОВЕРЧИВЫЙ нужно употребить слово ДОВЕРИТЕЛЬНЫЙ.", options: ["А) Среди доверчивых людей нередко встречаются те, кто поплатился за свою доверчивость.", "Б) Отношения между начальником и его подчинённым постепенно приобрели более доверчивый характер.", "В) Это было существо доверчивое, робкое и слабое.", "Г) Братья его были настолько наивными и доверчивыми, что обмануть их было совсем нетрудно."], correct: 1 },
            { q: "4. Выберите вариант ответа, в котором во всех словах одного ряда пропущена одна и та же буква. 1. проб..раться, с..дина, в..стибюль 2. отт..ргать, предпол..жить, заг..релые 3. от..езд, из..являть, ад..ютант 4. кр..кодил, к..лбаса, к..лготки 5. пр..вовой, б..лотный, угр..жать", options: ["А) 1234", "Б) 345", "В) 234", "Г) 14"], correct: 3 },
            { q: "5. Выберите вариант ответа, в котором во всех словах одного ряда пропущена одна и та же буква. 1. пр…образ, вз…браться, пр…российский 2. пр..стройка, непр..рывный, пр..станище 3. о..благодарил, по..стилка, по..ытожил 4. нен..глядный, з..йти, пр..родина 5. и..подтишка, ра..трогаться, бе..человечный", options: ["А) 123", "Б) 34", "В) 15", "Г) 145"], correct: 3 },
            { q: "6. Выберите вариант ответа, в котором во всех словах одного ряда пропущена одна и та же буква. 1. повер..шь, подта..вший 2. накол..шь, движ..мый 3. вытерп..шь, запомн..вшийся 4. дремл..шь, предвид..вший 5. поджар..шь, наследу..мый", options: ["А) 34", "Б) 1235", "В) 23", "Г) 145"], correct: 0 },
            { q: "7. Выберите вариант ответа, в котором все выделенные слова пишутся РАЗДЕЛЬНО. А) Античный мыслитель Цицерон выступал (ЗА)ТО, ЧТО(БЫ) ... Б) Историкам известно, что часто (В)ТЕЧЕНИЕ ... (НА)ЕДИНЕ ... В) Цветы (ВО)КРУГ нас –– это барометры: они, ТАК(ЖЕ) ... Г) Экзамен перенесли (НА)КОНЕЦ марта, (ПО)ЭТОЙ причине ...", options: ["А", "Б", "В", "Г"], correct: 2 },
            { q: "8. Укажите все цифры, на месте которых пишется НН. На подоко(1)ике стоял деревя(2)ый ящик, позолоче(3)ый краской, внутри него лежали недописа(4)ый сценарий ...", options: ["А)1234", "Б)123", "В)34", "Г)124"], correct: 2 },
            { q: "9. Укажите варианты ответов, в которых НЕ с выделенным словом пишется РАЗДЕЛЬНО. 1. (НЕ)ЗАКОНЧЕННАЯ ... 2. (НЕ)ПОТЕПЛЕВШЕЙ ... 3. (НЕ)ДОСЫПАЛИ ... 4. (НЕ)ЗАНАВЕШЕННЫЕ ... 5. (НЕ)СМОЛКАВШИЕ ...", options: ["А) 134", "Б) 34", "В)125", "Г) 1245"], correct: 2 },
            { q: "10. Выберите вариант ответа, в котором отсутствует грамматическая ошибка.", options: ["А) банка консервированных абрикос.", "Б) По обоим сторонам реки цвела сирень.", "В) Пятьюстами метрами ниже по реке находилась лодочная станция.", "Г) Не трогай крапиву! Она больно жгётся."], correct: 3 },
            { q: "11. Расставьте знаки препинания: Возвращая первоначальную красоту ... (1) Шуваловскому дворцу ... (2) реставраторы ... (3) готовившими ... (4) прославившегося ...", options: ["А) 23", "Б) 123", "В) 234", "Г) 1234"], correct: 2 },
            { q: "12. Расставьте все недостающие знаки препинания. Хлопья снега (1) по словам горожан (2) были такие большие, что (3) казалось (4) будто (5) с неба слетают ...", options: ["А) 12345", "Б) 1234", "В) 124", "Г) 123"], correct: 2 },
            { q: "13. Выберите предложения, соответствующее характеристике: БЕССОЮЗНОЕ СЛОЖНОЕ ПРЕДЛОЖЕНИЕ.", options: ["А) Может показаться странным, но утолить на болоте...", "Б) Иволги свищут, рябины в цвету, белеют на ивах серёжки.", "В) Почему в нашем лесу стало меньше птиц...", "Г) Мудрость, как считал древний философ, приносит три плода..."], correct: 1 },
            { q: "14. Расставьте знаки препинания. Укажите предложение, в котором нужно поставить ОДНУ запятую.", options: ["А) Пленяющая красота русских пейзажей поразительна и надолго остаётся в памяти.", "Б) К числу самых древних изображений на стенах пещер ... оттиски руки человека и непонятные узоры ...", "В) Логику познания Декарт выстроил от простейшего и очевидного к сложному ...", "Г) Для художественной речи характерна как образность так и эмоциональность."], correct: 3 },
            { q: "15. Расставьте знаки препинания. Та самая река (1) на берегу (2) которой (3) Евгений провёл бóльшую часть своей жизни (4) была неузнаваема.", options: ["А) 14", "Б) 124", "В) 1234", "Г) 24"], correct: 1 },
            { q: "16. Расставьте знаки препинания. Птиц не было слышно (1) потому что они не поют в часы зноя (2) и в застывшем лесу (3) стояла тишина.", options: ["А) 123", "Б) 23", "В) 13", "Г) 12"], correct: 1 },
            { q: "17. Определите, какое средство языковой выразительности употреблено в этом предложении. И звезда с звездою говорит.", options: ["А) метафора", "Б) сравнение", "В) олицетворение", "Г) гипербола"], correct: 2 }
        ];

        let current = 0;
        let answers = new Array(questions.length).fill(null);

        function render() {
            let html = `<div class="question"><div class="progress">Вопрос ${current + 1} из ${questions.length}</div><p>${questions[current].q}</p><div class="options">`;
            questions[current].options.forEach((opt, i) => {
                html += `<label><input type="radio" name="q" ${answers[current] === i ? 'checked' : ''} onchange="answers[${current}] = ${i}"> ${opt}</label><br>`;
            });
            html += `</div></div>`;
            document.getElementById('quiz').innerHTML = html;
        }

        function nextQuestion() { if (current < questions.length-1) { current++; render(); } }
        function prevQuestion() { if (current > 0) { current--; render(); } }

        function submitQuiz() {
            let score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (answers[i] === questions[i].correct) score++;
            }
            let percent = Math.round(score / questions.length * 100);
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('score').innerHTML = `
                <div class="result">${percent === 100 ? '🎉 100 БАЛЛОВ! Отлично!' : `Результат: ${score}/${questions.length} (${percent}%)`}</div>
                <p style="text-align:center; font-size:1.5em;">${percent >= 85 ? 'Ты отлично подготовился!' : 'Повтори слабые темы и пройди ещё раз'}</p>
                <div style="text-align:center;"><button onclick="location.reload()" style="padding:15px 40px; font-size:18px;">Пройти заново</button></div>
            `;
            document.getElementById('score').style.display = 'block';
        }

        render();
    </script>
</body>
</html>
